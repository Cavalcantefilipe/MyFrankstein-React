customHeaders:
  - pattern: '**/*'
    headers:
      - key: 'Content-Security-Policy'
        value: "default-src 'self'; connect-src 'self' https://myfranksteinbackend-production.up.railway.app; img-src 'self' data: blob: https://raw.githubusercontent.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; font-src 'self' data:; object-src 'self'; frame-src 'self' blob:; frame-ancestors 'none'"
  - pattern: '**/*.pdf'
    headers:
      - key: 'Content-Type'
        value: 'application/pdf'
      - key: 'Content-Disposition'
        value: 'attachment'
